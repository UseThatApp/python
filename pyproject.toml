[build-system]
requires = ["setuptools>=82.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "usethatapp"
version = "0.1.0"
description = "For use in your UseThatApp Web Apps"
readme = "README.md"
authors = [{ name = "UseThatApp", email = "support@usethatapp.com"}]
license = "MIT"
license-files= ["LICENSE"]
classifiers = [
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
]
keywords = ["UseThatApp", "Python", "Web Apps"]
dependencies = [
    "cryptography == 46.0.5",
]
requires-python = ">=3.8"

[project.urls]
Homepage = "https://github.com/UseThatApp/python.git"